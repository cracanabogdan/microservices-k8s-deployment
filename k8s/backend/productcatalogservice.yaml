apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
spec:
  selector: 
   matchLabels:
    app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      containers:
      - name: service
        image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.8.0
        ports:
        - containerPort: 3550
        env:
        - name: PORT
          value: "3550"
        livenessProbe:
          httpGet: 
            path: /health
            port: 3550
          periodSeconds: 5
        readinessProbe:
          grpc: 
            port: 3550
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
  ports:
  - protocol: TCP
    port: 3550
    targetPort: 3550